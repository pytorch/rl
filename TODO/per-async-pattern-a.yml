# Enable Prioritized Experience Replay under the fully-async collector pattern.
#
# Context: scratch/sat/sac_per_fully_async.py runs collector.start() with a
# shared replay buffer. The current implementation is forced to use a uniform
# sampler because PrioritizedSampler raises on pickling (see
# torchrl/data/replay_buffers/samplers.py:693-698). PER did help in the
# synchronous v32 run (success@0.10=0.750 vs v24 uniform's 0.624 in earlier
# CPU sweeps), so combining PER + fully-async is a likely win.
#
# Architectural review of the constraint already done by the Explore agent on
# 2026-05-07; conclusion: ~30 min change of pattern, no torchrl-core surgery
# needed -- "Pattern A: main-process-owned sampler, shared storage".

items:

  - id: "01"
    title: "Wire PER into the fully-async loop via Pattern A (main-process sampler over shared storage)"
    priority: high
    category: feature
    motivation: >-
      v37 (fully-async, uniform sampler, 16k envs, 6400 outer iters) is the
      current best at success@0.10=0.773. v32 (sync, PER, same hyperparams)
      hit 0.750. PER gave an apparent ~+5pp lift in earlier CPU runs (v25
      vs v24 was 0.602 vs 0.598; older v23 PER vs uniform deltas were
      ~+5pp). Re-introducing PER under fully-async is the single biggest
      hyperparameter lever we have not yet tried.

    evidence:
      - >-
        torchrl/data/replay_buffers/samplers.py:693-698 -- PrioritizedSampler
        explicitly raises in __getstate__ when get_spawning_popen() is set.
        Comment: "cannot be shared between processes."
      - >-
        torchrl/data/replay_buffers/samplers.py:750-766 -- the C++ segment
        trees (SumSegmentTreeFp32/Fp64, MinSegmentTreeFp32/Fp64) are the
        actual non-picklable assets. They store priorities; sharing them
        across procs would require either custom serialization or per-proc
        locking, both of which are out of scope.
      - >-
        test/test_rb.py:2807-2812 -- existing test asserts the raise. The
        restriction is intentional, not a TODO. Implication: do not try to
        un-gate __getstate__; build around it.
      - >-
        Async PPO solved a similar coherency problem with StalenessAwareSampler
        rather than by sharing PrioritizedSampler -- see commit 5ecc18c34.
        Pattern A matches that precedent.
      - >-
        SliceSampler.cache_values has the same flavor of "per-proc state
        alongside shared storage" (samplers.py:1520-1532) and warns rather
        than forbids -- design pattern is already in the codebase.

    design:
      pattern: >-
        Pattern A. The shared replay buffer holds storage only (uniform
        sampler in the worker). The PrioritizedSampler lives only in the
        main process. The trainer calls a thin wrapper that:

          1. tracks rb.write_count between training steps;
          2. on a delta, calls sampler.extend(new_indices) so freshly-
             written transitions get the current max priority;
          3. samples by calling sampler.sample(rb_storage, batch_size)
             rather than rb.sample();
          4. updates priorities via sampler.update_priority(idx, td_err)
             after each grad step.

      sketch: |
        # New module: scratch/sat/_async_per.py (or torchrl/data/replay_buffers/async_per.py
        # if upstreaming).
        class AsyncPER:
            def __init__(self, shared_rb, alpha, beta, batch_size):
                self._rb = shared_rb           # uniform, shared=True
                self._sampler = PrioritizedSampler(
                    max_capacity=shared_rb._storage.max_size,
                    alpha=alpha, beta=beta,
                )
                self._batch_size = batch_size
                self._last_write_count = 0

            def _catch_up(self):
                cur = int(self._rb.write_count)
                if cur > self._last_write_count:
                    new = torch.arange(self._last_write_count, cur)
                    # Wraparound: if we overflowed buffer_size, the oldest
                    # entries got evicted and re-written. We reassign max
                    # priority to those slots regardless -- the old priority
                    # was for a different sample.
                    new = new % self._rb._storage.max_size
                    self._sampler.extend(new)
                    self._last_write_count = cur

            def sample(self):
                self._catch_up()
                idx, info = self._sampler.sample(self._rb._storage, self._batch_size)
                td = self._rb._storage[idx]
                td.set("index", idx)
                td.set("_weight", info["_weight"])
                return td

            def update_tensordict_priority(self, sampled_td):
                # Same API as TensorDictPrioritizedReplayBuffer.
                idx = sampled_td.get("index")
                td_err = sampled_td.get("td_error").detach().abs()
                self._sampler.update_priority(idx, td_err)

      open_questions:
        - >-
          Wraparound: if the writer wraps the storage (>1M transitions)
          before the trainer catches up, sampler.extend(new_indices) on
          modulo-wrapped indices will overwrite priorities for slots that
          were also overwritten in storage. Probably fine -- old priorities
          are stale anyway -- but worth a comment in the code.
        - >-
          Locking: rb.write_count is read without a lock. Reading a 64-bit
          int on x86 / aarch64 is atomic; the worst case is a stale read,
          which the next call's _catch_up will pick up. Document this.
        - >-
          Index semantics inside RB.sample(): TorchRL's standard sample
          path returns indices into the storage. We bypass rb.sample() and
          drive the storage directly via self._rb._storage[idx], so the
          sampler indices and storage indices line up by construction.
          Confirm this matches the storage's __getitem__ contract.

    files_to_touch:
      - scratch/sat/sac_per_fully_async.py
      - >-
        Either scratch/sat/_async_per.py (new helper, lives next to the
        script) or scratch/sat/_utils.py (extend with a helper class).
        Prefer the dedicated file -- it isolates the experiment so we do
        not mix it into the shared utils used by PPO too.

    integration_steps:
      - >-
        Build the wrapper class. Keep the API identical to
        TensorDictPrioritizedReplayBuffer.{sample, update_tensordict_priority}
        so the training loop in sac_per_fully_async.py changes by exactly
        two lines (the construction site and the priority-update call).
      - >-
        In sac_per_fully_async.py, branch on cfg.no_prb: True -> existing
        TensorDictReplayBuffer path; False -> new AsyncPER wrapper.
      - >-
        Set --no-prb to default False on the new script (currently True
        because PER was unsupported). Update the launch command in any
        shell helpers / docs.
      - >-
        First training-loop call to AsyncPER.sample() must come *after*
        the existing buffer-warmup gate (sac_per_fully_async.py:441-445).
        The wrapper's _catch_up() will no-op when the buffer is empty.

    verification:
      smoke_test: >-
        Run for 200 outer iters with --num-envs 1024 --batch-size 4096
        --gradient-steps 4 (small config). Expect: no crashes,
        sampler.update_priority calls succeed, td_error magnitudes
        decrease over time as policy converges, training metrics match
        the uniform-sampler baseline within noise for the first ~50 iters
        (PER advantage builds up over time, not in the first batch).
      apples_to_apples: >-
        Re-run the exact v37 launch command but with PER on. Compare the
        per-frame eval/eval/success_rate@0.10 curve to v37 (wandb
        8skfd0fz). Pattern A does NOT change wall-clock per iter
        meaningfully because sampler.extend is O(new_indices * log N),
        cheap relative to the grad step. Expect equal or better
        per-frame sample efficiency.
      negative_control: >-
        Set --prb-alpha 0 (uniform via PER -- all priorities equal).
        Should reproduce v37 within noise. If it does not, the bug is in
        the wrapper, not in PER itself.

    acceptance:
      - >-
        Smoke test passes: 200 iters, no crashes, td_error logged in wandb
        and finite throughout.
      - >-
        Negative control (prb-alpha=0) reproduces v37's curve to within
        1pp on success@0.10 over the first 1000 iters.
      - >-
        Full v43 = v37 config + PER on: success@0.10 reaches at least
        v37's 0.773 peak, and either reaches it sooner (frame count) or
        plateaus higher.

    risk_if_unfixed:
      - >-
        Practical: we never test whether PER + fully-async beats uniform
        + fully-async. We currently *think* PER helps but only have CPU
        evidence at smaller scale (v25 vs v24 was a 0.4pp delta).
      - >-
        Strategic: leaving "PER unsupported" as a known gap in the
        async path makes it harder to argue the fully-async pattern
        is a drop-in replacement for the sync collector. Closing it
        keeps the experiment matrix orthogonal.

    estimated_effort: 30-60 minutes for a working wrapper + smoke test.
                      Add ~30 min for full v43 launch + first eval point.

    upstream_consideration: >-
      If the wrapper proves out, consider promoting it into TorchRL as
      torchrl.data.replay_buffers.AsyncPrioritizedReplayBuffer. Same
      shape as the existing TensorDictPrioritizedReplayBuffer but
      designed for shared-storage / per-proc-sampler use. Out of scope
      for this experiment but worth flagging in the PR description.
