# Friction points hit during the satellite RL experiment series
# (SAC v23-v43, PPO v44-v45). Each item is a real wall-clock cost the
# experimenter paid; the proposed fix is what would have saved them.
#
# Ranking is by frequency-of-impact * average-debug-time. Items at the
# top burned hours; items at the bottom burned ~tens of minutes but are
# easy fixes.

ranking:
  hours_of_pain: ["01", "02", "03"]
  significant_friction: ["04", "05", "06", "07", "08"]
  papercuts: ["09", "10", "11"]


items:

  - id: "01"
    title: "MultiCollector(sync=False) silently drops `action_log_prob` from worker writes"
    priority: critical
    category: bug

    painpoint: >-
      Running PPO with a fully-async collector (MultiCollector(sync=False),
      replay_buffer attached, trajs_per_batch=1) -- the worker writes
      complete trajectories into the shared buffer, but the buffer ends up
      with only ``action`` and not ``action_log_prob``, even though the
      ProbabilisticActor was constructed with ``return_log_prob=True``.
      ClipPPOLoss then crashes with ``KeyError: "Couldn't find the log-prob
      action_log_prob in the input data."``

    evidence: >-
      Sync collector with the IDENTICAL actor + buffer + trajs_per_batch=1
      writes ``action_log_prob`` correctly (PPO v44 trained successfully
      for 30 iters this way, 2026-05-07). Switching to MultiCollector
      with sync=False (PPO v45, same hyperparameters, same actor) gives
      a buffer schema with ``action`` but no ``action_log_prob``, no
      ``loc``, no ``scale``. Confirmed via debug print of
      ``rb._storage[:n].keys(True, True)``.

    friction: >-
      Took ~45 min to identify because (a) the error message ("Couldn't
      find action_log_prob") points at PPO loss internals, not at the
      collector; (b) sync mode works so it's tempting to blame
      hyperparameters, not the collector class; (c) ``return_log_prob=True``
      was right there in the actor config so you stop suspecting the
      log-prob path. Effective debug step was a manual key dump of the
      buffer.

    diagnosis: >-
      Most likely the worker re-instantiates the policy via pickle and
      ``return_log_prob=True`` plus the auto-derived ``log_prob_keys``
      doesn't survive the round-trip. ProbabilisticActor's docstring at
      ``torchrl/modules/tensordict_module/probabilistic.py:127-133`` says
      ``log_prob_keys`` defaults to ``<sample_key_name>_log_prob`` -- the
      derivation may run only at first construction, not on rebuild.

    proposed_solutions:
      - >-
        **(short term)** When MultiCollector ships a policy to a worker,
        eagerly serialize the ``log_prob_keys`` / ``log_prob_key`` /
        ``return_log_prob`` attributes and replay them on the receiving
        side. Add a regression test:
        ``MultiCollector + ProbabilisticActor(return_log_prob=True) +
        replay_buffer`` should put ``action_log_prob`` in the buffer.
      - >-
        **(better)** Add a runtime check in MultiCollector's startup
        that, on the first batch, validates the worker's policy
        out_keys + log_prob_keys match what the trainer's policy
        produced in a sync forward. Log a clear warning if they
        diverge -- "the worker policy is missing keys X, Y; this likely
        means PPO/SAC will fail later."
      - >-
        **(workaround for users)** Document the explicit override:
        ``ProbabilisticActor(..., return_log_prob=True,
        log_prob_keys=["action_log_prob"])`` -- the explicit form survives
        pickling.

    estimated_effort: 2-4 hours including the test.

    files_to_inspect:
      - torchrl/modules/tensordict_module/probabilistic.py
      - torchrl/collectors/_multi_async.py
      - torchrl/collectors/_runner.py


  - id: "02"
    title: "PrioritizedSampler can't be shared across processes (closed by PR #3714, but better error needed)"
    priority: high
    category: docs / dx

    painpoint: >-
      Trying to use ``TensorDictPrioritizedReplayBuffer(shared=True)`` with
      an async collector raises ``RuntimeError: Samplers of type
      PrioritizedSampler cannot be shared between processes`` from inside
      ``__getstate__``. The error is clear but the workaround
      (``sync=False``, added by PR #3714 on 2026-05-07) is not
      discoverable from the error message.

    evidence: >-
      Hit on 2026-05-07 trying to launch SAC v37/v43 with PER. Spent
      ~15 min reading samplers.py to confirm the restriction is
      intentional, then ~20 min designing a Pattern A workaround
      (separate sampler in the main process); only later learned PR
      #3714 had landed the same fix upstream a day earlier.

    friction: >-
      Primarily docs: the ``RuntimeError`` could mention ``sync=False``
      as the supported workaround. The ``samplers.py:693-698`` raise is
      in ``__getstate__``, far from the user-facing buffer constructor;
      the error trace makes it look like a fundamental impossibility
      rather than a known pattern with an opt-in flag.

    proposed_solutions:
      - >-
        Edit the raise to mention ``sync=False``:
        ``"Samplers of type PrioritizedSampler cannot be shared between
        processes. Use TensorDictPrioritizedReplayBuffer(sync=False)
        instead -- the writer process gets a uniform sampler and the
        learner keeps a local prioritized sampler. See PR #3714."``
      - >-
        Add a quick example in the buffer's docstring showing the
        async-PER pattern.

    estimated_effort: 30 min (docstring + error message edit, plus
                      a quick test that pickling a uniform-sampler
                      buffer succeeds).

    files_to_inspect:
      - torchrl/data/replay_buffers/samplers.py:693-698
      - torchrl/data/replay_buffers/replay_buffers.py (PrioritizedReplayBuffer docstring)


  - id: "03"
    title: "Inductor compile of frame-skip-unrolled env step takes hours on CUDA"
    priority: high
    category: performance / defaults

    painpoint: >-
      ``SatelliteEnv(compile_step=True)`` with ``frame_skip=50`` triggers
      ``torch.compile`` on a function that internally unrolls the
      frame_skip loop. The resulting graph has 50 mujoco_torch.step
      calls and inductor's fusion / sympy-shape simplification balloons
      compile time to multi-hour territory on H100.

    evidence: >-
      First SAC GPU launch (v26) was stuck for 53 minutes in
      inductor's ``can_fusion_increase_peak_memory`` (sympy-bound).
      py-spy showed the main thread inside ``compute_required_storage_length``
      and ``buffer_reuse_key`` -- O(n²) fusion analysis over the
      50-step graph. The same code on CPU compiled in ~30 s.

    friction: >-
      The default behavior unrolls the loop because the original
      comment at ``torchrl/envs/custom/mujoco/_backends.py`` (now
      patched, but the original commit had it) said "bake the loop into
      an outer function so torch.compile sees a stable graph for a
      fixed frame_skip per call." That logic is correct for CPU but
      pathological for CUDA. Took 1.5 hours to discover; fix was
      compiling the per-step fn instead and keeping the loop in
      Python (commit on mujoco-torch-envs branch).

    proposed_solutions:
      - >-
        **(default)** Change ``_TorchBackend._build_step_fn`` to compile
        the per-step function only; keep ``frame_skip`` as a Python
        loop. Inductor compiles a tiny graph quickly; the loop overhead
        per env-step is negligible (frame_skip is typically 10-100,
        each with mujoco_torch.step doing real work).
      - >-
        Pass ``dynamic=False`` by default in compile_kwargs when
        ``compile_step=True``. The env shape is known and stable;
        dynamic shape tracking is unnecessary overhead. (We hit this
        explicitly: switching to ``dynamic=False`` cut a separate
        sympy-bound phase by ~half.)
      - >-
        Document that for any vmapped env with ``frame_skip > 1``,
        the per-step compile is the recommended path.

    estimated_effort: 1 hour to land the default + a benchmark in
                      ``benchmarks/`` showing CPU-vs-CUDA compile time.

    files_to_inspect:
      - torchrl/envs/custom/mujoco/_backends.py (the build_step_fn fix is local
        to this file; promote it as the default)


  - id: "04"
    title: "shared=True replay buffer silently incompatible with prefetch>0"
    priority: medium
    category: dx

    painpoint: >-
      ``TensorDictReplayBuffer(shared=True, prefetch=3)`` raises
      ``ValueError: Cannot share prefetched replay buffers.`` only at
      buffer construction time -- but the message is far enough from
      the user's intent that it costs a debug round-trip.

    evidence: >-
      Hit during SAC v37 setup. Buffer was constructed with the
      same defaults that work for sync mode (``prefetch=3``); flipping
      ``shared=True`` made it crash. The fix is trivial (drop prefetch),
      but the failure mode obscured the underlying constraint.

    friction: >-
      Took ~5 min to fix. The ValueError message is fine; the
      friction is more that the documentation around shared buffers
      doesn't surface the mutual-exclusion with prefetch.

    proposed_solutions:
      - >-
        Auto-disable prefetch when ``shared=True``, with a warning:
        "prefetch is not supported with shared=True; disabling. See
        TensorDictReplayBuffer.shared docstring." This matches the
        ``SliceSampler.cache_values`` pattern (warn rather than raise).
      - >-
        Or keep the raise but expand the message to mention the fix:
        "Cannot share prefetched replay buffers. Pass prefetch=0 or
        shared=False."

    estimated_effort: 15 min.

    files_to_inspect:
      - torchrl/data/replay_buffers/replay_buffers.py (around the prefetch
        validation)


  - id: "05"
    title: "trajs_per_batch + MultiCollector + large num_envs is CPU-bound on _traj_ingest"
    priority: medium
    category: performance

    painpoint: >-
      With ``MultiCollector(sync=False, replay_buffer=rb, trajs_per_batch=1,
      num_envs=16384)``, the worker spends >30 minutes per collection in
      ``_traj_ingest`` (assembling per-trajectory chunks from the batched
      env output and writing them to the shared buffer one at a time).
      GPU utilization is 0%, CPU is pegged at 100%.

    evidence: >-
      PPO v45 attempt 1 (2026-05-08): 16384 envs, 35 minutes elapsed,
      worker still in _traj_ingest, buffer empty. py-spy showed
      ``_get_item -> _index_tensordict -> __getitem__ -> _traj_ingest``.
      Reducing num_envs to 4096 made disassembly tractable but kept
      everything CPU-bound.

    friction: >-
      The user-facing API doesn't warn about scaling. The "completed
      trajectories" promise is appealing for PPO, but the worker pays
      O(num_envs * frames_per_env) CPU work on each collection batch
      to do per-trajectory disassembly + sequential writes to the
      shared buffer. The disassembly is a pure-Python loop over
      ``traj_ids.unique()`` at
      ``torchrl/collectors/utils.py:436-449``.

    proposed_solutions:
      - >-
        Vectorize ``_traj_ingest``: instead of looping over unique
        traj IDs and indexing one at a time, sort frames by traj_id
        once, then take contiguous slices and batched extends.
      - >-
        Document the scaling cost in the ``trajs_per_batch`` docstring:
        "expect O(num_envs) CPU overhead per collection; for
        num_envs > ~4k consider larger frames_per_env to amortize."
      - >-
        Provide a ``trajs_per_write`` knob so the worker can write
        trajectories in batches (e.g. 32 at a time) rather than one
        at a time.

    estimated_effort: 2-4 hours for the vectorized version; 30 min
                      for the docstring fix.

    files_to_inspect:
      - torchrl/collectors/utils.py:418-449
      - torchrl/collectors/_base.py (_iter_by_trajectories)


  - id: "06"
    title: "GAE has no built-in chunking of the value-net forward; OOMs at scale"
    priority: medium
    category: performance / dx

    painpoint: >-
      Running GAE on a flat buffer of 19M timesteps hits OOM trying
      to allocate ~37 GB for the intermediate activations of the
      value MLP. The GAE module has no chunked-forward mode --
      everything goes through one big forward pass.

    evidence: >-
      PPO v44 first launch with num_envs=32768, frames_per_env=600:
      ``torch.OutOfMemoryError: CUDA out of memory. Tried to allocate
      37.50 GiB. GPU 0 has a total capacity of 79.18 GiB``. The
      value MLP is 4×256, so per-layer activation = 19M × 256 × 4 B =
      19.5 GB. Workaround was to drop num_envs to 16K.

    friction: >-
      For PPO at scale -- which is exactly the regime this code is
      designed for -- the GAE forward over a full collection batch is
      the natural way to compute advantages. Forcing the user to
      chunk it manually is annoying and error-prone.

    proposed_solutions:
      - >-
        Add ``value_chunk_size`` (or ``value_batch_size``) kwarg on
        ``GAE`` (and ``VTrace``, ``TD0``...). When set, the value-net
        forward is split into chunks of that size; advantages are
        accumulated as before. Default ``None`` = current behavior.
      - >-
        Bonus: detect activation memory at runtime and fall back to a
        chunked forward automatically when about to OOM.

    estimated_effort: 2 hours. The internal forward is one
                      ``self.value_network(td)`` call -- swap for a
                      chunked loop with concatenation.

    files_to_inspect:
      - torchrl/objectives/value/advantages.py (GAE._call)


  - id: "07"
    title: "Process Evaluator's `busy_policy='error'` default is too strict for fast iters"
    priority: medium
    category: dx

    painpoint: >-
      ``Evaluator(backend="process")`` defaults to ``busy_policy="error"``,
      which raises ``RuntimeError: Evaluation already pending`` if the
      training loop triggers a new eval before the previous one
      finishes. With fast iters (~0.5s) and ``eval_every=50``, the
      iter cadence is ~25s but eval rollouts take ~30s -- guaranteed
      collision.

    evidence: >-
      SAC v37 first run crashed at iter ~100 with this exact error.
      Workaround: guard ``trigger_eval`` with ``not evaluator.pending``
      in user code. But every script needs the same guard.

    friction: >-
      Each training script ends up with the same boilerplate guard.
      Easy to forget; the error is fatal (kills the run) instead of
      degrading gracefully.

    proposed_solutions:
      - >-
        Change the default to ``busy_policy="skip"`` (or
        ``busy_policy="queue"`` if that has saner semantics). A
        crashing default is harsher than the rare case where the
        user actually wanted to know.
      - >-
        Or expose ``Evaluator.maybe_trigger_eval(...)`` that just
        returns False if pending. Saves the guard.

    estimated_effort: 30 min (default change) or 1 hour (new method).

    files_to_inspect:
      - torchrl/collectors/_evaluator.py (around trigger_eval and
        busy_policy handling)


  - id: "08"
    title: "Eval-thread shutdown emits a 'Queue is closed' Traceback as expected behavior"
    priority: low
    category: dx / cosmetic

    painpoint: >-
      Every successful training run that uses the ``backend="process"``
      Evaluator ends with a stderr Traceback ending in
      ``ValueError: Queue ... is closed`` from the eval thread. This is
      the expected behavior at shutdown (main exits, eval workers
      time out), but it shows up as a Traceback that's
      indistinguishable from a real crash in CI logs and monitor
      grep filters.

    evidence: >-
      Every SAC + PPO run in the v23-v45 series ends with this
      traceback. We had to filter Traceback in our log monitors to
      avoid false alarms.

    friction: >-
      Every script that monitors training has to special-case this
      traceback. Erodes trust in the "Traceback = bad" heuristic.

    proposed_solutions:
      - >-
        Catch the ``ValueError("Queue ... is closed")`` inside the
        eval-thread shutdown path and either suppress or log at
        DEBUG level instead of letting it bubble.
      - >-
        Use a ``threading.Event`` for shutdown signaling so the
        eval thread exits cleanly before its queue is closed.

    estimated_effort: 30 min - 1 hour.

    files_to_inspect:
      - torchrl/collectors/_evaluator.py (_eval_loop)
      - torchrl/collectors/_multi_sync.py (queue_out.get)


  - id: "09"
    title: "shared=True replay buffer requires CPU storage but doesn't validate at construction"
    priority: low
    category: dx

    painpoint: >-
      ``TensorDictReplayBuffer(storage=LazyTensorStorage(N, device="cuda:0"),
      shared=True)`` constructs without complaint, but the multiprocess
      shared-memory machinery only works for CPU tensors -- the worker
      hits a confusing failure at first write.

    evidence: >-
      Hit during SAC v37 design. We preemptively set ``buffer_device=cpu``
      after reading shared-memory caveats; without that hint the failure
      mode would have been opaque.

    friction: >-
      Construction-time silence; first-write or first-pickle failure.
      Better to fail loudly at the buffer constructor.

    proposed_solutions:
      - >-
        At construction, if ``shared=True`` and the storage device is
        not ``cpu``, raise preemptively: ``"shared=True requires storage
        device='cpu'; got device=<x>. Pass storage=LazyTensorStorage(
        ..., device='cpu')."``

    estimated_effort: 15 min.

    files_to_inspect:
      - torchrl/data/replay_buffers/replay_buffers.py (the share() path)


  - id: "10"
    title: "rb._storage[:] read-then-write idiom is non-obvious"
    priority: low
    category: api

    painpoint: >-
      To run GAE over a buffer's contents and persist the
      ``state_value`` / ``advantage`` / ``value_target`` keys back, the
      idiom is ``td = rb._storage[:n]; advantage(td); rb._storage[:n] =
      td``. Using the private ``_storage`` attribute is the only way
      to bypass the sampler indirection; ``rb.sample()`` returns a
      shuffled subset, not the full buffer in order.

    evidence: >-
      PPO v44/v45 use this exact idiom. Worked but felt fragile.

    friction: >-
      ``_storage`` is implementation-internal; relying on it in user
      code is brittle. There's no public API for "get the whole buffer
      as a flat ordered td."

    proposed_solutions:
      - >-
        Add ``ReplayBuffer.scan(in_order=True) -> TensorDictBase`` (or
        ``read_all_in_order``): returns a view of the storage in
        physical order. Pair with ``ReplayBuffer.write_all(td)`` for
        the symmetric write.
      - >-
        Or document the ``_storage[:]`` slice pattern explicitly with
        an example in the GAE / PPO recipe in the docs.

    estimated_effort: 1 hour for the new methods.

    files_to_inspect:
      - torchrl/data/replay_buffers/replay_buffers.py (ReplayBuffer)


  - id: "11"
    title: "MultiProcessWeightSyncScheme cross-device tensor moves are implicit"
    priority: low
    category: dx

    painpoint: >-
      When the trainer is on ``cuda:1`` and the worker is on ``cuda:0``,
      weight syncs go from cuda:1 to cuda:0 implicitly. There's no
      visible logging of the device hop, and if either side has a
      stale CUDA context the failure is opaque.

    evidence: >-
      PPO v45 launched with ``--device cuda:1 --collect-device cuda:0``;
      no error, but also no obvious indication weights were syncing
      correctly across devices. Required a separate inspection of
      worker actor weights to verify.

    friction: >-
      Mostly observability. A debug log line on each weight sync
      ("synced N params main(cuda:1) -> worker(cuda:0)") would let
      users confirm without manual instrumentation.

    proposed_solutions:
      - >-
        Add a DEBUG-level log on each weight sync naming the source
        and destination devices, the number of params, and the byte
        size. Cheap, surfaces a class of silent bugs.

    estimated_effort: 15 min.

    files_to_inspect:
      - torchrl/weight_update/_shared.py
