# This workflow builds the torchrl docs and deploys them to gh-pages.
name: Generate documentation
on:
  push:
    branches:
      - nightly
      - main
      - release/*
    tags:
      - v[0-9]+.[0-9]+.[0-9]
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  # Documentation suggests ${{ github.head_ref }}, but that's only available on pull_request/pull_request_target triggers, so using ${{ github.ref }}.
  # On master, we want all builds to complete even if merging happens faster to make it easier to discover at which point something broke.
  group: docs-${{ github.ref == 'refs/heads/main' && format('ci-master-{0}', github.sha) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-docs:
    strategy:
      matrix:
        python_version: [ "3.12" ]
        cuda_arch_version: [ "12.8" ]
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      upload-artifact: docs
      timeout: 120
      # Use PyTorch image with newer GCC for GLIBCXX_3.4.30 support (needed by AOTInductor in export.py)
      docker-image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-devel
      script: |
        set -e
        set -v
        
        # Install system dependencies (Ubuntu-based PyTorch image)
        apt-get update
        apt-get install -y libglfw3 libglfw3-dev libgl1-mesa-glx libgl1-mesa-dev libegl1-mesa-dev \
          freeglut3-dev libglu1-mesa libegl1 mesa-utils xvfb wget git cmake \
          ffmpeg libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
          libavdevice-dev libavfilter-dev libswresample-dev pkg-config
        
        # 2. upgrade pip, ninja and packaging
        python -m pip install --upgrade pip
        python -m pip install setuptools ninja packaging "pybind11[global]" -U
        
        # 3. check python version
        python --version
        
        # 4. Check git version
        git version
        
        # 5. Install PyTorch
        # Uninstall pre-installed packages from Docker image to avoid conflicts
        # (gym conflicts with gymnasium, torch/torchaudio versions conflict with nightly)
        python -m pip uninstall -y torch torchvision torchaudio gym || true
        
        if [[ ${{ github.event_name }} == push && (${{ github.ref_type }} == tag || (${{ github.ref_type }} == branch && ${{ github.ref_name }} == release/*)) ]]; then
          # Use stable PyTorch for releases (tags and release/* branches)
          python -m pip install torch torchvision --quiet --root-user-action=ignore
          python -m pip install cloudpickle packaging importlib_metadata numpy orjson "pyvers>=0.2.3,<0.3.0" --quiet --root-user-action=ignore
          python -m pip install tensordict --no-deps --quiet --root-user-action=ignore
          python -m pip install torchcodec --quiet --root-user-action=ignore
        else
          # Use nightly PyTorch for main, nightly, and PRs
          python -m pip install --pre torch torchvision --index-url https://download.pytorch.org/whl/nightly/cpu -U --quiet --root-user-action=ignore
          python -m pip install cloudpickle packaging importlib_metadata numpy orjson "pyvers>=0.2.3,<0.3.0" --quiet --root-user-action=ignore
          python -m pip install git+https://github.com/pytorch/tensordict.git --no-deps --quiet --root-user-action=ignore
          torchcodec_dir=$(mktemp -d)
          git clone --depth 1 https://github.com/pytorch/torchcodec.git "$torchcodec_dir"
          python_base="$(python -c 'import sys; print(sys.base_prefix)')"
          CMAKE_PREFIX_PATH="${python_base}${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" \
            I_CONFIRM_THIS_IS_NOT_A_LICENSE_VIOLATION=1 \
            python -m pip install --no-build-isolation "$torchcodec_dir" --quiet --root-user-action=ignore
          rm -rf "$torchcodec_dir"
        fi
        
        # 6. Install doc requirements BEFORE TorchRL to ensure gymnasium is available
        # (TorchRL's gym backend detection happens at import time)
        python -m pip install -r docs/requirements.txt --quiet --root-user-action=ignore
        
        # 7. Install TorchRL
        python -m pip install -e . --no-build-isolation --no-deps

        # 8. Assert PyTorch version matches expectations
        if [[ ${{ github.event_name }} == push && (${{ github.ref_type }} == tag || (${{ github.ref_type }} == branch && ${{ github.ref_name }} == release/*)) ]]; then
          bash .github/unittest/helpers/assert_torch_version.sh stable
          bash .github/unittest/helpers/assert_torch_tensordict_versions.sh stable
        else
          bash .github/unittest/helpers/assert_torch_version.sh nightly
          bash .github/unittest/helpers/assert_torch_tensordict_versions.sh nightly
        fi

        # 9. Set sanitize version
        if [[ ${{ github.event_name }} == push && (${{ github.ref_type }} == tag || (${{ github.ref_type }} == branch && ${{ github.ref_name }} == release/*)) ]]; then
          echo '::group::Enable version string sanitization'
          # This environment variable just has to exist and must not be empty. The actual value is arbitrary.
          # See docs/source/conf.py for details
          export RL_SANITIZE_VERSION_STR_IN_DOCS=1
          echo '::endgroup::'
        fi

        # 10. Test torchrl installation
        mkdir _tmp
        cd _tmp
        PYOPENGL_PLATFORM=egl MUJOCO_GL=egl python -c """from torchrl.envs.libs.dm_control import DMControlEnv
        print(DMControlEnv('cheetah', 'run', from_pixels=True).reset())"""
        cd ..

        # 10b. Sphinx-gallery cache: restore the executed gallery output from
        # the docs-gallery-cache branch so sphinx-gallery's .md5 checksums
        # skip re-executing tutorials whose source is unchanged. Restored on
        # pull requests and pushes to main only:
        # - never on schedule (the nightly orchestrator's docs build is the
        #   daily full rebuild that catches tutorials broken by library
        #   changes and refreshes the cache);
        # - never on tags/release branches (they build with stable torch and
        #   must not inherit outputs executed under nightly torch).
        # The cache key folds in conf.py, docs/requirements.txt and the
        # resolved torch/sphinx-gallery versions; tensordict/torchrl source
        # is deliberately excluded (staleness is bounded to <=24h by the
        # nightly writer). Published pages for unchanged tutorials therefore
        # show outputs from an older build. Set TORCHRL_DOCS_GALLERY_CACHE=0
        # to disable.
        GH_EVENT_NAME="${{ github.event_name }}"
        GH_REF_TYPE="${{ github.ref_type }}"
        GH_REF_NAME="${{ github.ref_name }}"
        gallery_cache_key=$(
          {
            sha256sum docs/source/conf.py docs/requirements.txt
            python -c "import torch, sphinx_gallery; print(f'torch={torch.__version__} sphinx-gallery={sphinx_gallery.__version__}')"
          } | sha256sum | cut -d' ' -f1
        )
        echo "sphinx-gallery cache key: ${gallery_cache_key}"
        gallery_cache_restore=0
        if [[ "${TORCHRL_DOCS_GALLERY_CACHE:-1}" == "1" ]]; then
          if [[ "${GH_EVENT_NAME}" == "pull_request" ]] || { [[ "${GH_EVENT_NAME}" == "push" && "${GH_REF_TYPE}" == "branch" && "${GH_REF_NAME}" == "main" ]]; }; then
            gallery_cache_restore=1
          fi
        fi
        if [[ "${gallery_cache_restore}" == "1" ]]; then
          gallery_cache_dir=$(mktemp -d)
          if git clone --quiet --depth 1 --branch docs-gallery-cache https://github.com/pytorch/rl.git "${gallery_cache_dir}" 2>/dev/null; then
            if [[ "$(cat "${gallery_cache_dir}/cache-key.txt" 2>/dev/null)" == "${gallery_cache_key}" && -d "${gallery_cache_dir}/tutorials" ]]; then
              mkdir -p docs/source/tutorials
              cp -r "${gallery_cache_dir}/tutorials/." docs/source/tutorials/
              echo "Restored sphinx-gallery cache"
            else
              echo "sphinx-gallery cache key mismatch or unexpected layout; full rebuild"
            fi
          else
            echo "No docs-gallery-cache branch yet; full rebuild"
          fi
          rm -rf "${gallery_cache_dir}"
        else
          echo "sphinx-gallery cache restore disabled for this event (${GH_EVENT_NAME})"
        fi

        # 11. Fetch the MuJoCo Menagerie assets used by the macro-control tutorial.
        # MuJoCo Menagerie is a model repository, not an installable Python package,
        # so we keep the docs dependency as a sparse checkout instead of adding it
        # to docs/requirements.txt.
        MENAGERIE_DIR="$(pwd)/.docs_mujoco_menagerie"
        git clone --depth=1 --filter=blob:none --sparse \
          https://github.com/google-deepmind/mujoco_menagerie.git "$MENAGERIE_DIR"
        git -C "$MENAGERIE_DIR" sparse-checkout set \
          universal_robots_ur5e robotiq_2f85
        export TORCHRL_MUJOCO_MENAGERIE_PATH="$MENAGERIE_DIR"
        
        # 12. Build doc
        export MAX_IDLE_COUNT=180 # Max 180 secs before killing an unresponsive collector
        export BATCHED_PIPE_TIMEOUT=180
        # Reduced tutorial workloads in CI (fewer rollouts, smaller renders);
        # see the TUTORIAL_FAST blocks in tutorials/sphinx-tutorials/.
        export TORCHRL_TUTORIALS_FAST=1
        cd ./docs
        # timeout 7m bash -ic "MUJOCO_GL=egl sphinx-build ./source _local_build" || code=$?; if [[ $code -ne 124 && $code -ne 0 ]]; then exit $code; fi
        # bash -ic "PYOPENGL_PLATFORM=egl MUJOCO_GL=egl sphinx-build ./source _local_build" || code=$?; if [[ $code -ne 124 && $code -ne 0 ]]; then exit $code; fi
        PYOPENGL_PLATFORM=egl MUJOCO_GL=egl TORCHRL_CONSOLE_STREAM=stdout sphinx-build ./source _local_build -v -j 4
        cd ..

        # 13. Per-example time budget: fail loudly when a tutorial regresses
        # the build (a single tutorial once tripled it, unnoticed for weeks).
        python .github/scripts/check_tutorial_time_budget.py docs/source/tutorials/sg_execution_times.rst

        # 14. Stage the executed gallery output for the cache-writer job on
        # the events that update the docs-gallery-cache branch: pushes to
        # main and the nightly (schedule) full rebuild. The upload job strips
        # this directory before publishing to gh-pages.
        if [[ "${GH_EVENT_NAME}" == "schedule" ]] || { [[ "${GH_EVENT_NAME}" == "push" && "${GH_REF_TYPE}" == "branch" && "${GH_REF_NAME}" == "main" ]]; }; then
          mkdir -p "${RUNNER_ARTIFACT_DIR}/sphinx-gallery-cache"
          cp -r docs/source/tutorials "${RUNNER_ARTIFACT_DIR}/sphinx-gallery-cache/"
          echo "${gallery_cache_key}" > "${RUNNER_ARTIFACT_DIR}/sphinx-gallery-cache/cache-key.txt"
          echo "Staged sphinx-gallery cache for the writer job"
        fi

        cp -r docs/_local_build/* "${RUNNER_ARTIFACT_DIR}"
        echo $(ls "${RUNNER_ARTIFACT_DIR}")
        # Note: previously written as `if [[ ${{ github.event_name == 'pull_request' }} ]]`,
        # which renders to `[[ true ]]` / `[[ false ]]` -- both truthy -- so
        # the copy ran on every event.
        if [[ "${GH_EVENT_NAME}" == "pull_request" ]]; then
          cp -r docs/_local_build/* "${RUNNER_DOCS_DIR}"
        fi

  upload:
    needs: build-docs
    if: github.repository == 'pytorch/rl' && github.event_name == 'push' &&
      ((github.ref_type == 'branch' && github.ref_name == 'main') || github.ref_type == 'tag')
    permissions:
      contents: write
    uses: pytorch/test-infra/.github/workflows/linux_job.yml@main
    with:
      repository: pytorch/rl
      download-artifact: docs
      ref: gh-pages
      test-infra-ref: main
      script: |
        set -euo pipefail

        REF_TYPE=${{ github.ref_type }}
        REF_NAME=${{ github.ref_name }}

        if [[ "${REF_TYPE}" == branch ]]; then
          if [[ "${REF_NAME}" == main ]]; then
            TARGET_FOLDER="${REF_NAME}"
          # Bebug:
          # else
          #   TARGET_FOLDER="release-doc"
          fi
        elif [[ "${REF_TYPE}" == tag ]]; then
          case "${REF_NAME}" in
            *-rc*)
              echo "Aborting upload since this is an RC tag: ${REF_NAME}"
              exit 0
              ;;
            *)
              # Strip the leading "v" as well as the trailing patch version. For example:
              # 'v0.15.2' -> '0.15'
              TARGET_FOLDER=$(echo "${REF_NAME}" | sed 's/v\([0-9]\+\)\.\([0-9]\+\)\.[0-9]\+/\1.\2/')
              ;;
          esac
        fi

        echo "Target Folder: ${TARGET_FOLDER}"

        mkdir -p "${TARGET_FOLDER}"
        rm -rf "${TARGET_FOLDER}"/*

        # The build job stages the sphinx-gallery cache in the artifact for
        # the update-gallery-cache job; it must not land on the docs site.
        rm -rf "${RUNNER_ARTIFACT_DIR}/sphinx-gallery-cache"

        echo $(ls "${RUNNER_ARTIFACT_DIR}")
        rsync -a "${RUNNER_ARTIFACT_DIR}"/ "${TARGET_FOLDER}"
        git add "${TARGET_FOLDER}" || true

        # Debug
        # if [[ "${TARGET_FOLDER}" == "main" ]] || [[ "${TARGET_FOLDER}" == "release-doc" ]]; then
        if [[ "${TARGET_FOLDER}" == "main" ]] ; then
          mkdir -p _static
          rm -rf _static/*
          cp -r "${TARGET_FOLDER}"/_static/* _static
          git add _static || true
        fi

        git config user.name 'pytorchbot'
        git config user.email 'soumith+bot@pytorch.org'
        git config http.postBuffer 524288000
        git commit -m "auto-generating sphinx docs" || true
        git push

  # Refresh the docs-gallery-cache branch from the executed gallery output.
  # Writers: pushes to main (tutorial edits refresh their own entries) and
  # the nightly schedule run (a full rebuild, bounding cache staleness with
  # respect to torch/tensordict/torchrl to <=24h). The branch holds a single
  # force-pushed orphan commit, so it never grows.
  update-gallery-cache:
    needs: build-docs
    if: github.repository == 'pytorch/rl' &&
      ((github.event_name == 'push' && github.ref_type == 'branch' && github.ref_name == 'main') || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      # docs.yml's own concurrency group is per-sha on main, so two builds
      # can finish concurrently; serialize the writers instead of racing.
      group: docs-gallery-cache
      cancel-in-progress: false
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs-artifact
      - name: Force-push the cache branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -d docs-artifact/sphinx-gallery-cache/tutorials ]; then
            echo "No sphinx-gallery cache in the docs artifact; nothing to update."
            exit 0
          fi
          cd docs-artifact/sphinx-gallery-cache
          git init --initial-branch=docs-gallery-cache --quiet
          git config user.name 'pytorchbot'
          git config user.email 'soumith+bot@pytorch.org'
          git add tutorials cache-key.txt
          git commit --quiet -m "sphinx-gallery cache from ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" docs-gallery-cache
