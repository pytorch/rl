name: Unit-tests on Linux

on:
  pull_request:
  push:
    branches:
      - nightly
      - main
      - release/*
  workflow_dispatch:
  workflow_call:

env:
  CHANNEL: "nightly"

concurrency:
  # Documentation suggests ${{ github.head_ref }}, but that's only available on pull_request/pull_request_target triggers, so using ${{ github.ref }}.
  # On master, we want all builds to complete even if merging happens faster to make it easier to discover at which point something broke.
  group: test-linux-${{ github.ref == 'refs/heads/main' && format('ci-master-{0}', github.sha) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  test-setup-minimal:
    strategy:
      matrix:
        python_version: ["3.10", "3.14"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.4xlarge
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      timeout: 90
      script: |
        set -euo pipefail
        export PYTHON_VERSION=${{ matrix.python_version }}
        export CU_VERSION="cpu"
        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"
        bash .github/unittest/linux/scripts/run_setup_test.sh

  tests-cpu:
    strategy:
      matrix:
        # PR version set: 3.10 (oldest), 3.13 (newest with the full optional
        # dependency stack) and 3.14 (newest, cheap -- most optional deps do
        # not install there) run all three shards on every event. 3.11 and
        # 3.12 run only on non-PR events via tests-cpu-mid below.
        python_version: ["3.10", "3.13", "3.14"]
        shard: ["bulk", "collectors", "mp"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.12xlarge
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      timeout: 120
      upload-artifact: test-results-cpu-${{ matrix.python_version }}-shard-${{ matrix.shard }}
      script: |
        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi
        export TD_GET_DEFAULTS_TO_NONE=1
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        export CU_VERSION="cpu"
        export TORCHRL_TEST_SHARD=${{ matrix.shard }}

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"

        ## setup_env.sh
        bash .github/unittest/linux/scripts/run_all.sh

  # All shards for the middle Python versions. Skipped on pull requests
  # (3.10/3.13/3.14 bracket the version range there); pushes to main and the
  # nightly orchestrator keep full five-version coverage. For an on-demand
  # full run on a PR branch, use workflow_dispatch.
  tests-cpu-mid:
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        python_version: ["3.11", "3.12"]
        shard: ["bulk", "collectors", "mp"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.12xlarge
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      timeout: 120
      upload-artifact: test-results-cpu-${{ matrix.python_version }}-shard-${{ matrix.shard }}
      script: |
        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi
        export TD_GET_DEFAULTS_TO_NONE=1
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        export CU_VERSION="cpu"
        export TORCHRL_TEST_SHARD=${{ matrix.shard }}

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"

        ## setup_env.sh
        bash .github/unittest/linux/scripts/run_all.sh

  tests-gpu:
    strategy:
      matrix:
        python_version: ["3.12"]
        cuda_arch_version: ["13.0"]
        # Test sharding: split tests into 3 parallel jobs for faster execution
        # Shard 1: test/transforms/ (transform tests)
        # Shard 2: test/envs/ + test_collectors.py (multiprocessing-heavy)
        # Shard 3: all other tests
        shard: ["1", "2", "3"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda_arch_version }}
      timeout: 120
      upload-artifact: test-results-gpu-shard-${{ matrix.shard }}
      script: |
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        # Commenting these out for now because the GPU test are not working inside docker
        export CUDA_ARCH_VERSION=${{ matrix.cuda_arch_version }}
        export CU_VERSION="cu${CUDA_ARCH_VERSION:0:2}${CUDA_ARCH_VERSION:3:1}"
        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi
        export TD_GET_DEFAULTS_TO_NONE=1

        # Run everything except distributed tests; those run in parallel in tests-gpu-distributed.
        export TORCHRL_TEST_SUITE=nondistributed
        export TORCHRL_TEST_SHARD=${{ matrix.shard }}

        # Remove the following line when the GPU tests are working inside docker, and uncomment the above lines
        #export CU_VERSION="cpu"

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"
        echo "TORCHRL_TEST_SHARD: $TORCHRL_TEST_SHARD"

        ## setup_env.sh
        bash .github/unittest/linux/scripts/run_all.sh

  tests-gpu-distributed:
    strategy:
      matrix:
        python_version: ["3.12"]
        cuda_arch_version: ["13.0"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda_arch_version }}
      timeout: 120
      upload-artifact: test-results-gpu-distributed
      script: |
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        # Commenting these out for now because the GPU test are not working inside docker
        export CUDA_ARCH_VERSION=${{ matrix.cuda_arch_version }}
        export CU_VERSION="cu${CUDA_ARCH_VERSION:0:2}${CUDA_ARCH_VERSION:3:1}"
        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi
        export TD_GET_DEFAULTS_TO_NONE=1

        # Only distributed tests (runs in parallel with tests-gpu).
        export TORCHRL_TEST_SUITE=distributed

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"

        ## setup_env.sh
        bash .github/unittest/linux/scripts/run_all.sh

  # Oldest-supported-torch compatibility suite. Not run on PRs by default:
  # add the ci/olddeps label when a change uses a torch API that may not
  # exist in the oldest supported stable torch (see CLAUDE.md section 7b).
  # Labels do not retrigger the workflow -- label, then push or rerun.
  # Full runs happen on every push to main and on the nightly orchestrator.
  tests-olddeps:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci/olddeps')
    strategy:
      matrix:
        python_version: ["3.10"]
        cuda_arch_version: ["11.8"]
        # The single serial run reached 84 min of pytest (96 min job wall),
        # the critical path of the unit-test workflows. Fan out into three
        # serial shards; see linux_olddeps/scripts_gym_0_13/run_test.sh.
        shard: ["transforms", "quarantine", "remainder"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      docker-image: "nvidia/cuda:11.8.0-cudnn8-devel-ubuntu22.04"
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda_arch_version }}
      timeout: 120
      upload-artifact: test-results-olddeps-shard-${{ matrix.shard }}
      script: |
        set -euo pipefail
        export PYTHON_VERSION="3.10"
        export CU_VERSION="cu118"
        export TAR_OPTIONS="--no-same-owner"
        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi
        export TF_CPP_MIN_LOG_LEVEL=0
        export TD_GET_DEFAULTS_TO_NONE=1
        export TORCHRL_TEST_SHARD=${{ matrix.shard }}


        bash .github/unittest/linux_olddeps/scripts_gym_0_13/setup_env.sh
        bash .github/unittest/linux_olddeps/scripts_gym_0_13/batch_scripts.sh
        bash .github/unittest/linux_olddeps/scripts_gym_0_13/post_process.sh

  # Full optional-dependencies suite (~2h serial). Not run on PRs by
  # default: PRs get tests-optdeps-smoke below; add the ci/optdeps label
  # when a change touches optional-dependency integrations (see CLAUDE.md
  # section 7b). Labels do not retrigger the workflow -- label, then push
  # or rerun. Full runs happen on every push to main and on the nightly
  # orchestrator.
  tests-optdeps:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci/optdeps')
    strategy:
      matrix:
        python_version: ["3.12"]
        cuda_arch_version: ["13.0"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda_arch_version }}
      timeout: 120
      upload-artifact: test-results-optdeps
      script: |
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        # Commenting these out for now because the GPU test are not working inside docker
        export CUDA_ARCH_VERSION=${{ matrix.cuda_arch_version }}
        export CU_VERSION="cu${CUDA_ARCH_VERSION:0:2}${CUDA_ARCH_VERSION:3:1}"
        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi
        export TD_GET_DEFAULTS_TO_NONE=1

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"

        ## setup_env.sh
        bash .github/unittest/linux_optdeps/scripts/run_all.sh

  # PR-time replacement for tests-optdeps: builds the same optional-deps
  # environment but only proves it imports cleanly (test/smoke_test.py)
  # instead of running the ~2h suite. Skipped when ci/optdeps requests the
  # full run, and on non-PR events where tests-optdeps runs anyway.
  tests-optdeps-smoke:
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci/optdeps')
    strategy:
      matrix:
        python_version: ["3.12"]
        cuda_arch_version: ["13.0"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda_arch_version }}
      timeout: 60
      script: |
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        export CUDA_ARCH_VERSION=${{ matrix.cuda_arch_version }}
        export CU_VERSION="cu${CUDA_ARCH_VERSION:0:2}${CUDA_ARCH_VERSION:3:1}"
        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi
        export TD_GET_DEFAULTS_TO_NONE=1
        export TORCHRL_OPTDEPS_SMOKE=1

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"

        ## setup_env.sh
        bash .github/unittest/linux_optdeps/scripts/run_all.sh

  tests-stable-gpu:
    strategy:
      matrix:
        python_version: ["3.12"] # "3.9", "3.10", "3.11"
        cuda_arch_version: ["13.0"] # "11.6", "11.7"
        # Test sharding: split tests into 3 parallel jobs for faster execution
        shard: ["1", "2", "3"]
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda_arch_version }}
      timeout: 120
      upload-artifact: test-results-stable-gpu-shard-${{ matrix.shard }}
      script: |
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        # Commenting these out for now because the GPU test are not working inside docker
        export CUDA_ARCH_VERSION=${{ matrix.cuda_arch_version }}
        export CU_VERSION="cu${CUDA_ARCH_VERSION:0:2}${CUDA_ARCH_VERSION:3:1}"

        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi

        # Remove the following line when the GPU tests are working inside docker, and uncomment the above lines
        #export CU_VERSION="cpu"

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"
        export TD_GET_DEFAULTS_TO_NONE=1

        # Run everything except distributed tests; those run in parallel in tests-stable-gpu-distributed.
        export TORCHRL_TEST_SUITE=nondistributed
        export TORCHRL_TEST_SHARD=${{ matrix.shard }}

        echo "TORCHRL_TEST_SHARD: $TORCHRL_TEST_SHARD"

        ## setup_env.sh
        bash .github/unittest/linux/scripts/run_all.sh

  tests-stable-gpu-distributed:
    strategy:
      matrix:
        python_version: ["3.12"] # "3.9", "3.10", "3.11"
        cuda_arch_version: ["13.0"] # "11.6", "11.7"
      fail-fast: false
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.g5.4xlarge.nvidia.gpu
      repository: pytorch/rl
      docker-image: "nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04"
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda_arch_version }}
      timeout: 120
      upload-artifact: test-results-stable-gpu-distributed
      script: |
        # Set env vars from matrix
        export PYTHON_VERSION=${{ matrix.python_version }}
        # Commenting these out for now because the GPU test are not working inside docker
        export CUDA_ARCH_VERSION=${{ matrix.cuda_arch_version }}
        export CU_VERSION="cu${CUDA_ARCH_VERSION:0:2}${CUDA_ARCH_VERSION:3:1}"

        if [[ "${{ github.ref }}" =~ release/* ]]; then
          export RELEASE=1
          export TORCH_VERSION=stable
        else
          export RELEASE=0
          export TORCH_VERSION=nightly
        fi

        export TD_GET_DEFAULTS_TO_NONE=1
        export TORCHRL_TEST_SUITE=distributed

        echo "PYTHON_VERSION: $PYTHON_VERSION"
        echo "CU_VERSION: $CU_VERSION"

        ## setup_env.sh
        bash .github/unittest/linux/scripts/run_all.sh

  upload-codecov:
    needs:
      - tests-cpu
      - tests-cpu-mid
      - tests-gpu
      - tests-gpu-distributed
      - tests-optdeps
      - tests-stable-gpu
      - tests-stable-gpu-distributed
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: test-results-*
      - name: List coverage files
        run: find artifacts/ -name "coverage.xml" -type f
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: artifacts/
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: pytorch/rl
