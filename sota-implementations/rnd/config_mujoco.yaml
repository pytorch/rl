# task and env
env:
  env_name: HalfCheetah-v4

# collector
collector:
  frames_per_batch: 2048
  total_frames: 1_000_000

# logger
logger:
  backend: wandb
  project_name: torchrl_example_rnd
  group_name: null
  exp_name: RND_Mujoco
  test_interval: 50_000
  num_test_episodes: 5
  video: False

# Optim
optim:
  lr: 3e-4
  anneal_lr: True
  device:

# PPO loss
loss:
  gamma: 0.99
  mini_batch_size: 64
  ppo_epochs: 10
  gae_lambda: 0.95
  clip_epsilon: 0.2
  anneal_clip_epsilon: False
  critic_coeff: 0.25
  entropy_coeff: 0.0
  loss_critic_type: l2

# RND
rnd:
  embed_dim: 64
  predictor_lr: 1e-4
  intrinsic_coeff: 1.0   # weight on the intrinsic reward added to extrinsic
  update_fraction: 0.25  # fraction of each batch used to update the predictor
  reward_clip: 5.0

compile:
  compile: False
  compile_mode:
  cudagraphs: False
