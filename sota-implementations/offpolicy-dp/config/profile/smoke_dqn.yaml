# @package _global_

environment:
  backend: gym
  total_num_envs: 2
  num_collectors: 2
  compile_step: false
  compile_mode: null
  max_episode_steps: 500

collection:
  total_frames: 4_096
  init_random_frames: 0
  learning_starts: 512
  frames_per_env: 256

replay:
  capacity: 8_192
  batch_size: 256
  num_cpus: 1
  transport: auto

learner:
  world_size: 2
  num_cpus_per_rank: 1
  num_gpus_per_rank: 1
  backend: nccl
  optim_steps_per_batch: 1
  poll_interval: 0.05
  setup_timeout: 300.0
  command_timeout: 600.0

logging:
  interval_frames: 512

evaluation:
  device: cpu
  num_envs: 1
  num_trajectories: 1
  interval_frames: 2_048
  max_steps: 500
  video_max_frames: 250
