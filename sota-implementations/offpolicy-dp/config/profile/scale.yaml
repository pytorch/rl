# @package _global_

environment:
  backend: mujoco-torch
  total_num_envs: 100_000
  num_collectors: 4
  compile_step: true
  compile_mode: default
  max_episode_steps: 1000

collection:
  total_frames: 20_000_000
  init_random_frames: 1_000_000
  frames_per_env: 1

replay:
  capacity: 5_000_000
  batch_size: 4096
  num_cpus: 2
  transport: distributed

learner:
  world_size: 4
  num_cpus_per_rank: 1
  num_gpus_per_rank: 1
  backend: nccl
  optim_steps_per_batch: 100
  poll_interval: 0.05
  setup_timeout: 600.0
  command_timeout: 1200.0

logging:
  # Distributed replay binds a fixed per-rank sample schema: 4096 / 4.
  sample_size: 1024
