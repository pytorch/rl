defaults:
  - env@training_env: transformed_env
  - env@training_env.base_env: vmas
  - transform@training_env.transform: reward_sum
  - transform@postproc0: expand_as
  - transform@postproc1: expand_as
  - transform@postproc: compose
  - collector@collector: sync
  - replay_buffer@replay_buffer: base
  - storage@replay_buffer.storage: lazy_tensor
  - writer@replay_buffer.writer: round_robin
  - sampler@replay_buffer.sampler: random
  - trainer@trainer: dqn
  - optimizer@optimizer: adam
  - network@networks.mixer_network: qmixer
  - loss@mixer_loss: mixer
  - target_net_updater@qmix_target_net_updater: soft
  - logger@logger: csv
  - _self_

seed: 0

env:
  scenario_name: balance
  n_agents: 3
  max_steps: 100
  vmas_envs: 600

model:
  shared_parameters: true

train:
  device: cpu
  num_epochs: 45
  minibatch_size: 4096
  lr: 5e-5
  max_grad_norm: 40.0

exploration:
  eps_init: 0.3
  eps_end: 0.0
  annealing_num_steps: 5000000

networks:
  qvalue_network:
    _target_: torchrl.modules.models.multiagent.MultiAgentMLP
    n_agent_inputs: 16
    n_agent_outputs: 9
    n_agents: ${env.n_agents}
    centralized: false
    share_params: ${model.shared_parameters}
    device: ${train.device}
    depth: 2
    num_cells: 256
    activation_class:
      _target_: torch.nn.Tanh
      _partial_: true
  mixer_network:
    state_shape:
      - ${env.n_agents}
      - 16
    mixing_embed_dim: 32
    n_agents: ${env.n_agents}
    device: ${train.device}

models:
  qvalue_model:
    _target_: torchrl.trainers.algorithms.configs.modules._make_qvalue_model
    network: ${networks.qvalue_network}
    action_space: categorical
    in_keys:
      - [agents, observation]
    action_key: [agents, action]
    action_value_key: [agents, action_value]
    chosen_action_value_key: [agents, chosen_action_value]
  mixer_model:
    _target_: torchrl.trainers.algorithms.configs.modules._make_tensordict_module
    module: ${networks.mixer_network}
    in_keys:
      - [agents, chosen_action_value]
      - [agents, observation]
    out_keys:
      - chosen_action_value

training_env:
  base_env:
    scenario: ${env.scenario_name}
    num_envs: ${env.vmas_envs}
    continuous_actions: false
    max_steps: ${env.max_steps}
    device: ${train.device}
    seed: ${seed}
    scenario_kwargs:
      n_agents: ${env.n_agents}
  transform:
    in_keys:
      - [agents, reward]
    out_keys:
      - [agents, episode_reward]

postproc0:
  in_key: [next, done]
  ref_key: [next, agents, reward]
  out_key: [next, agents, done]

postproc1:
  in_key: [next, terminated]
  ref_key: [next, agents, reward]
  out_key: [next, agents, terminated]

postproc:
  transforms:
    - ${postproc0}
    - ${postproc1}

collector:
  create_env_fn: ${training_env}
  policy: ${models.qvalue_model}
  frames_per_batch: 60000
  total_frames: 10000000
  device: ${train.device}
  storing_device: ${train.device}
  postproc: ${postproc}
  _partial_: true

replay_buffer:
  storage:
    max_size: ${collector.frames_per_batch}
    device: ${train.device}
    ndim: 1
  writer:
    compilable: false
  batch_size: ${train.minibatch_size}

mixer_loss:
  local_value_network: ${models.qvalue_model}
  mixer_network: ${models.mixer_model}
  loss_function: l2
  delay_value: true
  action_space: categorical
  gamma: 0.9
  reward_key: reward
  done_key: done
  terminated_key: terminated
  action_key: [agents, action]
  action_value_key: [agents, action_value]
  local_value_key: [agents, chosen_action_value]
  global_value_key: chosen_action_value

qmix_target_net_updater:
  tau: 0.005

loss: ${mixer_loss}

target_net_updater: ${qmix_target_net_updater}

optimizer:
  lr: ${train.lr}

logger:
  exp_name: qmix_vmas_${env.scenario_name}

trainer:
  collector: ${collector}
  optimizer: ${optimizer}
  replay_buffer: ${replay_buffer}
  target_net_updater: ${target_net_updater}
  loss_module: ${loss}
  value_network: ${models.qvalue_model}
  logger: ${logger}
  total_frames: ${collector.total_frames}
  frame_skip: 1
  clip_grad_norm: true
  clip_norm: ${train.max_grad_norm}
  progress_bar: true
  seed: ${seed}
  save_trainer_interval: 25000
  log_interval: 25000
  save_trainer_file: null
  optim_steps_per_batch: ${train.num_epochs}
  eps_init: ${exploration.eps_init}
  eps_end: ${exploration.eps_end}
  annealing_num_steps: ${exploration.annealing_num_steps}
  mixing_strategy: qmix
  reward_key: [agents, reward]
  episode_reward_key: [agents, episode_reward]
  aggregated_reward_key: reward
  aggregated_episode_reward_key: episode_reward
  done_key: done
  terminated_key: terminated
  action_key: [agents, action]
  observation_key: [agents, observation]
  async_collection: false
